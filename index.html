<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Shadow Grimoire</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=IM+Fell+English+SC&display=swap');

        :root {
            --gold: #d4af37;
            --blood: #7a1a1a;
            --void: #050505;
            --parchment: #e0d8ef;
        }

        body {
            background: radial-gradient(circle, #1a0b1a 0%, var(--void) 100%);
            color: var(--gold);
            font-family: 'IM Fell English SC', serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* Ambient Flicker */
        body::after {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.3);
            animation: flicker 5s infinite;
            pointer-events: none;
            z-index: 100;
        }

        @keyframes flicker {
            0%, 100% { opacity: 0.1; }
            50% { opacity: 0.25; }
            52% { opacity: 0.1; }
        }

        #card-table {
            position: relative;
            width: 340px;
            height: 500px;
            perspective: 1500px;
        }

        .card {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.5s;
            cursor: pointer;
        }

        .card.flipped { transform: rotateY(180deg); }
        .card.burn { opacity: 0; transform: scale(0.8) rotateY(180deg); }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border: 2px solid var(--gold);
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 35px;
            box-sizing: border-box;
            text-align: center;
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
        }

        .card-front {
            background: linear-gradient(135deg, #1a0b1a 0%, #000 100%);
            background-image: url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
        }

        .card-back {
            background: #0c0c0c;
            transform: rotateY(180deg);
            color: var(--parchment);
            font-size: 1.3rem;
            line-height: 1.5;
            border-color: var(--blood);
            text-shadow: 0 0 8px rgba(224, 216, 239, 0.4);
        }

        .seal {
            font-size: 5rem;
            margin-bottom: 20px;
            color: var(--gold);
            filter: drop-shadow(0 0 10px var(--gold));
        }

        .controls {
            margin-top: 50px;
            display: flex;
            gap: 25px;
        }

        button {
            background: #1a0b1a;
            border: 1px solid var(--gold);
            color: var(--gold);
            padding: 15px 30px;
            font-family: 'Cinzel Decorative', cursive;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.4s;
            letter-spacing: 2px;
            border-radius: 5px;
        }

        button:hover {
            background: var(--gold);
            color: var(--void);
            box-shadow: 0 0 20px var(--gold);
        }

        .veto-btn { border-color: var(--blood); color: var(--blood); }
        .veto-btn:hover { background: var(--blood); color: white; box-shadow: 0 0 20px var(--blood); }

    </style>
</head>
<body>

    <h1 style="font-family: 'Cinzel Decorative'; font-size: 1.8rem; letter-spacing: 4px; margin-bottom: 30px;">THE TOY'S RITUAL</h1>

    <div id="card-table">
        <div class="card" id="card" onclick="this.classList.toggle('flipped')">
            <div class="card-face card-front">
                <div class="seal">☾</div>
                <p style="letter-spacing: 3px;">TAP TO REVEAL</p>
            </div>
            <div class="card-face card-back" id="prompt-text">
                Prepare your skin...
            </div>
        </div>
    </div>

    <div class="controls">
        <button onclick="drawNew()">DRAW COMMAND</button>
        <button class="veto-btn" onclick="burnCard()">VETO</button>
    </div>

    <script>
        /* =========================================================
           ADD YOUR CARDS HERE 
           ---------------------------------------------------------
           Just follow the format: "Your text here",
           Make sure every line has a comma at the end EXCEPT the last one.
           =========================================================
        */
        const commands = [
            "THE GRAVITY WELL: Secure weights to the sac. I must stand perfectly still for 3 minutes while they stretch. Any movement earns a squeeze.",
            "THE CROW'S PINCH: Use your sharpest nails to find the skin between, pulling and pinching while I'm restricted.",
            "THE WICKED TWIST: Slowly rotate the sac a full half-turn. Hold it there while you tell me exactly what I am.",
            "THE CRUSHING DEPTHS: Place the sac between two flat surfaces (or your palms) and slowly lean your weight into them.",
            "THE BOUND STRETCH: With my hands tied high, pull my stones toward the floor until I'm on my tiptoes.",
            "THE BLOOD COIL: Use a thin lace or string to tie around the base, cinching it tight while you toy with the tops.",
            "THE COLD DECREE: Apply ice until they are shrunken and tight, then use your warm mouth to bring the heat back.",
            "THE MISTRESS'S CHOICE: You decide the tool, you decide the tension. No limit for 60 seconds.",
            // <--- Add your next idea here like this: "NEW PROMPT TEXT",
        ];

        const card = document.getElementById('card');
        const textDisplay = document.getElementById('prompt-text');

        function drawNew() {
            card.classList.remove('flipped', 'burn');
            
            // Short delay so the card flips back before the text changes
            setTimeout(() => {
                const randomIndex = Math.floor(Math.random() * commands.length);
                textDisplay.innerText = commands[randomIndex];
            }, 300);
        }

        function burnCard() {
            card.classList.add('burn');
            // Give it time to "vanish" before drawing a new one
            setTimeout(() => {
                drawNew();
            }, 500);
        }
    </script>
</body>
</html>
