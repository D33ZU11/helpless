<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Grimoire</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=IM+Fell+English+SC&display=swap');

        body {
            background: radial-gradient(circle, #1a0b1a 0%, #050505 100%);
            color: #d4af37;
            font-family: 'IM Fell English SC', serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            text-shadow: 0 0 10px rgba(212, 175, 55, 0.5);
        }

        /* Flickering Candlelight Effect */
        body::after {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.2);
            animation: flicker 4s infinite;
            pointer-events: none;
        }

        @keyframes flicker {
            0% { opacity: 0.1; } 5% { opacity: 0.3; } 10% { opacity: 0.1; } 
            15% { opacity: 0.4; } 100% { opacity: 0.1; }
        }

        #card-table {
            position: relative;
            width: 320px;
            height: 480px;
            perspective: 1500px;
        }

        .card {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
        }

        .card.flipped { transform: rotateY(180deg); }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border: 3px solid #4a3728;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 30px;
            box-sizing: border-box;
            background: #121212;
            box-shadow: 0 0 30px #000;
        }

        /* The "Back" of the card (The Witchy Pattern) */
        .card-front {
            background-image: url('https://www.transparenttextures.com/patterns/dark-leather.png'), linear-gradient(135deg, #2b1a2b 0%, #1a0b1a 100%);
            border-color: #d4af37;
        }

        .seal {
            font-size: 6rem;
            filter: drop-shadow(0 0 15px #d4af37);
        }

        /* The "Front" of the card (The Instruction) */
        .card-back {
            background: #0f0c08;
            transform: rotateY(180deg);
            border-color: #5e1d1d;
            color: #e0d8ef;
            font-size: 1.4rem;
            line-height: 1.6;
            box-shadow: inset 0 0 50px #000;
        }

        .controls {
            margin-top: 40px;
            display: flex;
            gap: 20px;
        }

        button {
            background: #2b1a2b;
            border: 1px solid #d4af37;
            color: #d4af37;
            padding: 12px 24px;
            font-family: 'Cinzel Decorative', cursive;
            cursor: pointer;
            transition: 0.5s;
            z-index: 10;
        }

        button:hover {
            background: #d4af37;
            color: #1a0b1a;
            box-shadow: 0 0 20px #d4af37;
        }

        .veto-btn { border-color: #7a1a1a; color: #7a1a1a; }
        .veto-btn:hover { background: #7a1a1a; color: #fff; }
    </style>
</head>
<body>

    <h1 style="font-family: 'Cinzel Decorative'; letter-spacing: 5px;">The Toy's Decree</h1>

    <div id="card-table">
        <div class="card" id="card" onclick="this.classList.toggle('flipped')">
            <div class="card-face card-front">
                <div class="seal">⛧</div>
                <p>Reveal Your Fate</p>
            </div>
            <div class="card-face card-back" id="prompt-text">
                Prepare yourself...
            </div>
        </div>
    </div>

    <div class="controls">
        <button onclick="newPrompt()">Draw Command</button>
        <button class="veto-btn" onclick="veto()">Reject (Veto)</button>
    </div>

    <script>
        const commands = [
            "THE WEIGHT OF SIN: Use clamps or a leather strap to hang a heavy weight from the sac. Leave me to dangle while you watch.",
            "THE DEVIL'S GRIP: Squeeze firmly with both hands, slowly increasing pressure until I beg, then maintain it for 30 seconds.",
            "STRETCHED ON THE RACK: Pull the sac down toward the floor while I am bound upright, ensuring my skin is taut and vulnerable.",
            "THE TWISTED WITCH: Take the sac and slowly twist 180 degrees. Hold it. Whisper what happens if I move.",
            "THE VELVET FLOG: Use a soft leather flogger or cloth to strike the sensitive skin underneath while they are pulled tight.",
            "ISOLATION: Use a ring or your fingers to isolate just one, stretching it away from the body to be toyed with alone.",
            "ICE & FIRE: Rub an ice cube over the stretched skin, followed immediately by a warm breath or candle wax."
        ];

        function newPrompt() {
            const card = document.getElementById('card');
            card.classList.remove('flipped'); // Reset flip
            
            setTimeout(() => {
                const random = commands[Math.floor(Math.random() * commands.length)];
                document.getElementById('prompt-text').innerText = random;
            }, 300);
        }

        function veto() {
            const card = document.getElementById('card');
            card.style.animation = "shake 0.5s ease";
            setTimeout(() => {
                card.style.animation = "";
                newPrompt();
            }, 500);
        }
    </script>

    <style>
        @keyframes shake {
            0% { transform: translateX(0); }
            25% { transform: translateX(-10px) rotate(-5deg); }
            50% { transform: translateX(10px) rotate(5deg); }
            100% { transform: translateX(0); }
        }
    </style>
</body>
</html>
