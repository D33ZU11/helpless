<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>The Shadow Grimoire | Veil of Whispers</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=IM+Fell+English+SC&family=MedievalSharp&display=swap" rel="stylesheet">
    <style>
        * { user-select: none; -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        :root {
            --gold: #e4c580; --blood: #8b2a2a; --void: #03000a; --parchment: #f2e9d0;
            --standard-glow: #6a4e2e; --tithe-royal: #7a3e6e; --abyss-dark: #3c1e2f;
        }

        body {
            background: radial-gradient(ellipse at 30% 40%, #2c1420 0%, var(--void) 100%);
            color: var(--gold); font-family: 'IM Fell English SC', serif;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
            margin: 0; padding: 10px; overflow-x: hidden; perspective: 1200px;
        }

        /* ===== BACKGROUND EFFECTS ===== */
        .living-background { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; overflow: hidden; }
        .heart { position: absolute; font-size: 1.2rem; opacity: 0.4; animation: floatHeart linear infinite; }
        @keyframes floatHeart {
            0% { transform: translateY(100vh) scale(0.5); opacity: 0; }
            20% { opacity: 0.6; }
            100% { transform: translateY(-20vh) scale(1.2); opacity: 0; }
        }
        .firework-spark {
            position: absolute; width: 4px; height: 4px; border-radius: 50%;
            animation: burstSpark 1.2s ease-out forwards; pointer-events: none;
        }
        @keyframes burstSpark {
            0% { opacity: 0; transform: scale(0.2); }
            20% { opacity: 0.9; transform: scale(1.5); }
            100% { opacity: 0; transform: scale(0.5) translateY(-40px); }
        }
        .glitter-mote { position: absolute; width: 2px; height: 2px; background: #ffd966; border-radius: 50%; animation: driftGlitter 8s infinite linear; }
        @keyframes driftGlitter { 0% { opacity: 0; } 30% { opacity: 0.8; } 100% { transform: translate(40px, -60px); opacity: 0; } }

        /* ===== HEADER & CARD ===== */
        .grimoire-header { text-align: center; z-index: 15; margin: 10px 0; }
        h1 { font-family: 'Cinzel Decorative', cursive; font-size: 1.45rem; letter-spacing: 3px; background: linear-gradient(135deg, #efd592, #b48b3a); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin: 0; }
        .sub { font-size: 0.7rem; color: #b48b5a; text-transform: uppercase; border-top: 1px solid rgba(228, 197, 128, 0.3); padding-top: 4px; }
        .card-holder { position: relative; width: 290px; height: 400px; z-index: 20; margin: 15px 0; filter: drop-shadow(0 15px 45px rgba(0,0,0,0.9)); }
        .card { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer; }
        .card.flipped { transform: rotateY(180deg); }
        .card-face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 25px; border: 2px solid var(--gold); display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 30px; text-align: center; box-shadow: inset 0 0 60px rgba(0,0,0,0.95); }
        .card-front { background: #0f0712; }
        .card-back { background: linear-gradient(145deg, #1a0b1c 0%, #050308 100%); transform: rotateY(180deg); color: var(--parchment); font-family: 'MedievalSharp', serif; font-size: 1.15rem; line-height: 1.5; border: 2px solid #634d2a; overflow-y: auto; }

        /* ===== BUTTONS ===== */
        .ritual-altar { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; width: 100%; max-width: 350px; z-index: 25; }
        button { background: rgba(15, 8, 20, 0.9); border: 1px solid var(--gold); color: var(--gold); padding: 12px 5px; font-family: 'Cinzel Decorative', cursive; font-size: 0.75rem; border-radius: 10px; cursor: pointer; }
        .btn-standard { background: radial-gradient(circle at 30% 20%, #8b5a2b, #4a3620); color: #ffefc0; }
        .btn-tithe { background: radial-gradient(circle at 70% 30%, #6a2e6e, #35203b); color: #f3d9ff; }
        .btn-abyss { background: radial-gradient(circle at 40% 50%, #2c1a2a, #150810); color: #ffb3b3; border-color: var(--blood); }
        .btn-wide { grid-column: span 3; font-size: 0.85rem; background: rgba(35, 15, 30, 0.8); }
        .banish-rune { margin-top: 20px; width: 180px; background: transparent; border: 1px dashed var(--gold); font-size: 0.65rem; color: #b48b5a; z-index: 30; }

        /* ===== MODAL ===== */
        .pact-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.97); z-index: 100; display: none; align-items: center; justify-content: center; }
        .pact-card { background: #120b17; border: 2px solid var(--gold); padding: 35px; border-radius: 20px; text-align: center; width: 85%; max-width: 300px; }
    </style>
</head>
<body>
    <div class="living-background" id="livingBg"></div>

    <div class="grimoire-header">
        <h1>🜏 THE SHADOW GRIMOIRE 🜏</h1>
        <div class="sub">✧ Rites of the Unspoken ✧</div>
    </div>

    <div class="card-holder" id="cardContainer">
        <div class="card" id="ritualCard">
            <div class="card-face card-front">
                <div style="font-size: 4rem; color: var(--gold);">◈</div>
                <p>TOUCH THE VEIL</p>
            </div>
            <div class="card-face card-back" id="oracleText">
                <div class="ritual-text">Speak the command...</div>
            </div>
        </div>
    </div>

    <div class="ritual-altar">
        <button onclick="handleRitual('standard')" class="btn-standard">Standard</button>
        <button onclick="handleRitual('tithe')" class="btn-tithe">Queen's Tithe</button>
        <button onclick="handleRitual('abyss')" class="btn-abyss">The Abyss</button>
        <button onclick="handleRitual('finish')" class="btn-wide">⚔️ Final Judgment</button>
        <button onclick="handleRitual('disposal')" class="btn-wide">🍷 The Disposal · Cherished</button>
        <button onclick="handleRitual('sanctuary')" class="btn-wide">🕯️ The Afterglow</button>
    </div>

    <button onclick="veto()" class="banish-rune">◉ BURN & BANISH ◉</button>

    <div id="pactOverlay" class="pact-overlay">
        <div class="pact-card">
            <h2>Invoke the Rite?</h2>
            <div style="display: flex; gap: 15px;">
                <button onclick="confirmPact(true)" style="flex:1">Seal Pact</button>
                <button onclick="confirmPact(false)" style="flex:1; color:#888">Retreat</button>
            </div>
        </div>
    </div>

    <script>
        /* === YOUR DESCRIPTIONS (SAFELY KEPT HERE) === */
        const RitualDecks = {
            standard: [
                "THE GRAVITY WELL · Secure weights to the sac. Stand motionless for 3 minutes. Any tremor earns a slow, crushing squeeze.", 
                "THE CROW'S PINCH · With sharp nails, find the skin between. Pull and pinch while you whisper my true title.", 
                "THE WICKED TWIST · Rotate the flesh a full half-turn. Hold while you recite: 'I am yours.'",
                "THE CRUSHING DEPTHS · Place between your palms and slowly lean weight into them. Count ten heartbeats."
            ],
            abyss: [
                "THE IRON GALLOWS · Weights attached. Stand on tiptoes. Each time heels touch floor, deliver a brutal squeeze.", 
                "THE SILENT ANCHOR · Heavy clamp applied. Ignored for 10 minutes kneeling.",
                "THE WEAVER'S NEEDLE · Trace the seams with a pin. Agonizing light pressure then a violent pinch at random."
            ],
            tithe: [
                "FOOTREST · Legs spread, sac weighted. Support her feet while she rests.", 
                "THE ROYAL CLEANSE · Use your tongue to clean her soles while the sac is stretched.",
                "THE MARKET PRICE · She marks you with ink: 'Tribute' across stretched skin. Wear it for one hour."
            ],
            finish: [
                "THE RUINED OFFERING · Edge to absolute brink— then a crushing squeeze and an ice shard. No release.", 
                "THE BROKEN PRAYER · Release granted only while being painfully twisted. Thank her for the agony."
            ],
            disposal: [
                "THE CLAY MASK · Applied to her face and lips. Worn as a sacred, silent statue.", 
                "THE GILDED COLLAR · Poured over her neck and chest. A permanent mark of the night's surrender.",
                "THE BITTER SWALLOW · She takes it all while maintaining eye contact. Total consumption."
            ],
            sanctuary: [
                "THE HEALER’S HANDS · Release all bindings. Cradle in warm palms with slow, loving strokes.", 
                "THE ANOINTING · Massage with blessed oil. 'You served well, beloved.'",
                "THE MOON SALVE · Cooling balm applied over all tender parts. Safety until dawn."
            ]
        };

        /* === LOGIC & ANIMATIONS === */
        let lastCategory = '', pendingCategory = '';
        const card = document.getElementById('ritualCard'), oracle = document.getElementById('oracleText'), bg = document.getElementById('livingBg');

        // Background FX
        function createHeart() {
            const h = document.createElement('div'); h.className = 'heart';
            h.innerHTML = ['❤️', '💖', '✨', '💗'][Math.floor(Math.random() * 4)];
            h.style.left = Math.random() * 100 + '%'; h.style.animationDuration = (5 + Math.random() * 5) + 's';
            bg.appendChild(h); setTimeout(() => h.remove(), 10000);
        }
        setInterval(createHeart, 1000);

        function spawnBurst(x, y) {
            for(let i=0; i<15; i++) {
                const s = document.createElement('div'); s.className = 'firework-spark';
                const a = Math.random() * Math.PI * 2, d = 40 + Math.random() * 60;
                s.style.left = x + 'px'; s.style.top = y + 'px';
                s.style.transform = `translate(${Math.cos(a)*d}px, ${Math.sin(a)*d}px)`;
                s.style.background = ['#ffb347','#ff6b6b','#f5cd7a'][Math.floor(Math.random()*3)];
                bg.appendChild(s); setTimeout(() => s.remove(), 1200);
            }
        }

        // Ritual Logic
        window.handleRitual = function(cat) {
            if (cat !== 'standard' && cat !== 'sanctuary' && cat !== lastCategory) {
                pendingCategory = cat; document.getElementById('pactOverlay').style.display = 'flex';
            } else { drawCard(cat); }
        };

        window.confirmPact = function(yes) {
            document.getElementById('pactOverlay').style.display = 'none';
            if (yes) { lastCategory = pendingCategory; drawCard(pendingCategory); }
        };

        function drawCard(cat) {
            const text = RitualDecks[cat][Math.floor(Math.random() * RitualDecks[cat].length)];
            const rect = card.getBoundingClientRect();
            spawnBurst(rect.left + rect.width/2, rect.top + rect.height/2);
            
            if (card.classList.contains('flipped')) {
                card.classList.remove('flipped');
                setTimeout(() => { oracle.innerHTML = `<div class="ritual-text">${text}</div>`; card.classList.add('flipped'); }, 400);
            } else {
                oracle.innerHTML = `<div class="ritual-text">${text}</div>`; card.classList.add('flipped');
            }
        }

        window.veto = function() {
            card.style.opacity = '0';
            setTimeout(() => {
                card.classList.remove('flipped'); oracle.innerHTML = `Sigil Burned...`;
                card.style.opacity = '1'; lastCategory = '';
            }, 400);
        };

        document.getElementById('cardContainer').onclick = () => card.classList.toggle('flipped');
    </script>
</body>
</html>
