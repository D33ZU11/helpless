<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>The Shadow Grimoire | Complete Ritual</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=IM+Fell+English+SC&display=swap" rel="stylesheet">
    <style>
        * { user-select: none; -webkit-tap-highlight-color: transparent; }
        :root {
            --gold: #e4c580; --blood: #8b2a2a; --void: #03000a;
            --purple-haze: #1a0b1c; --parchment: #f2e9d0;
        }

        body {
            background: radial-gradient(circle at center, var(--purple-haze) 0%, var(--void) 100%);
            color: var(--gold); font-family: 'IM Fell English SC', serif;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            min-height: 100vh; margin: 0; overflow: hidden; perspective: 1000px;
        }

        .particles { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; background-image: radial-gradient(circle, var(--gold) 1px, transparent 1px); background-size: 50px 50px; opacity: 0.1; animation: moveParticles 20s linear infinite; }
        @keyframes moveParticles { from { background-position: 0 0; } to { background-position: 500px 1000px; } }
        .flicker { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.1); animation: candleFlicker 3s infinite; pointer-events: none; z-index: 5; }

        h1 { font-family: 'Cinzel Decorative', cursive; font-size: 1.4rem; letter-spacing: 4px; text-align: center; margin: 5px 0; background: linear-gradient(to bottom, var(--gold), #856d3c); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        #card-table { position: relative; width: 280px; height: 380px; z-index: 10; margin: 10px 0; }
        .card { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; transition: transform 0.8s cubic-bezier(0.34, 1.56, 0.64, 1); border-radius: 20px; }
        .card.flipped { transform: rotateY(180deg) rotateZ(-2deg); }
        .card.burn { animation: burnAway 0.6s forwards; }
        @keyframes burnAway { 0% { transform: scale(1); } 50% { transform: scale(1.1); filter: brightness(3) sepia(1); } 100% { transform: scale(0); opacity: 0; } }

        .card-face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 20px; border: 2px solid var(--gold); display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; box-sizing: border-box; box-shadow: 0 15px 50px rgba(0,0,0,0.8); text-align: center; }
        .card-front { background: #0c0810; background-image: url('https://www.transparenttextures.com/patterns/dark-matter.png'); }
        .card-back { background: linear-gradient(135deg, #120a16 0%, #050505 100%); transform: rotateY(180deg); color: var(--parchment); font-size: 1.1rem; overflow-y: auto; display: flex; align-items: center; justify-content: center; }

        .controls-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; width: 320px; z-index: 20; padding: 10px; }
        button { background: rgba(20, 10, 25, 0.8); border: 1px solid var(--gold); color: var(--gold); padding: 12px 8px; font-family: 'Cinzel Decorative', cursive; border-radius: 5px; cursor: pointer; font-size: 0.65rem; letter-spacing: 1px; text-transform: uppercase; }
        button:hover { background: var(--gold); color: var(--void); }
        
        .btn-abyss { border-color: #ff4444; color: #ff4444; }
        .btn-special { border-color: #9370db; color: #9370db; }
        .btn-end { border-color: #fff; background: rgba(60,0,0,0.4); }
        .btn-disposal { border-color: #e4c580; background: rgba(40, 30, 10, 0.6); grid-column: span 2; }

        #confirm-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 100; display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        #confirm-overlay img { width: 120px; border-radius: 50%; border: 2px solid var(--gold); margin-bottom: 15px; }
    </style>
</head>
<body>
    <div class="particles"></div><div class="flicker"></div>

    <div id="confirm-overlay">
        <img src="https://api.dicebear.com/7.x/adventurer/svg?seed=evil-laugh&backgroundColor=03000a" alt="Grin">
        <h2 style="font-family: 'Cinzel Decorative'; color: var(--gold);">Proceed, Mistress?</h2>
        <p style="color: #888; padding: 0 20px;">The ritual demands total surrender.</p>
        <button onclick="confirmRitual(true)" style="padding: 10px 20px; font-size: 1rem; margin-bottom: 10px;">Seal the Pact</button>
        <button onclick="confirmRitual(false)" style="border-color: #444; color: #444;">Not yet</button>
    </div>

    <h1>🜏 THE SHADOW GRIMOIRE 🜏</h1>

    <div id="card-table">
        <div class="card" id="card" onclick="this.classList.toggle('flipped')">
            <div class="card-face card-front"><div style="font-size: 3rem;">𖤐</div><p>TAP TO REVEAL</p></div>
            <div class="card-face card-back" id="prompt-text">Select your ritual...</div>
        </div>
    </div>

    <div class="controls-grid">
        <button onclick="drawNew('standard')">Standard</button>
        <button onclick="requestRitual('tithe')" class="btn-special">Queen's Tithe</button>
        <button onclick="requestRitual('abyss')" class="btn-abyss">The Abyss</button>
        <button onclick="requestRitual('finish')" class="btn-end">Finish Him</button>
        <button onclick="requestRitual('disposal')" class="btn-disposal">The Disposal (Cherished)</button>
        <button onclick="requestRitual('sanctuary')" class="btn-special" style="grid-column: span 2;">Sanctuary</button>
    </div>

    <script>
        const decks = {
            standard: [
                "THE GRAVITY WELL: Secure weights to the sac. Stand perfectly still for 3 minutes. Any movement earns a squeeze.",
                "THE CROW'S PINCH: Use sharp nails to find the skin between, pulling and pinching while I am restricted.",
                "THE WICKED TWIST: Rotate the sac a full half-turn. Hold it while you tell me exactly what I am.",
                "THE CRUSHING DEPTHS: Place the sac between your palms and slowly lean your weight into them.",
                "THE BLOOD COIL: Tie thin lace or string around the base, cinching it tight while you toy with the tops.",
                "THE COLD DECREE: Apply ice until they are shrunken and tight, then use your warm mouth to bring heat back.",
                "THE MISTRESS'S CHOICE: You decide the tool and the tension. No limit for 60 seconds.",
                "THE SILENT TRIAL: No words for 2 minutes. Every attempt to speak earns sudden, sharp pressure.",
                "THE SORROW'S HINGE: Fold the sac gently but firmly. Rock it side to side while reciting my submission.",
                "THE GILDED KNOT: Tie a silk cord around the package, tightening one notch each time I gasp.",
                "THE RITUAL OF TWO PALMS: Cup them and slap upwards from below with rhythmic force, counting to thirteen.",
                "THE MERCY THRESHOLD: Edge me with a flogger until I beg, then delay the strike for six heartbeats."
            ],
            abyss: [
                "THE IRON GALLOWS: Weights attached. Stand on tiptoes. Every time heels touch the floor, deliver a brutal squeeze.",
                "THE SILENT ANCHOR: Heavy clamp applied. Ignored for 10 minutes while kneeling. Any sound resets the timer.",
                "THE WEAVER’S NEEDLE: Pin-tool tracing the seams. Agonizingly light pressure followed by a violent pinch.",
                "THE GRAVITY CRUSH: Lay flat. Use your full weight to step on the sac, increasing pressure until I beg.",
                "STRETCHED ON THE RACK: Pull the sac toward the floor while I am bound upright, ensuring skin is taut and vulnerable.",
                "THE INCUBUS WEIGHT: I lie flat; you straddle my hips. Shift your weight slowly onto the dangling flesh."
            ],
            tithe: [
                "THE HUMAN FOOTREST: Legs spread and sac weighted. Support her feet while she rests. Wobbling earns a heel grind.",
                "THE ROYAL CLEANSE: Use your tongue to clean her shoes/feet while the sac is stretched back between your legs.",
                "THE BREATH COLLECTOR: No air allowed until she finishes a task. Your discomfort is her background music.",
                "THE MARKET PRICE: She labels you with a marker—writing 'TRASH' across the skin while it is stretched taut."
            ],
            finish: [
                "THE RUINED OFFERING: Edge to the absolute brink—then a crushing squeeze and a cold ice cube. No release.",
                "THE BROKEN PRAYER: Release granted only while being painfully twisted. Thank her for the pain while you climax.",
                "THE DEBT COLLECTOR: If he releases early, spend the next hour in heavy clamps while being ignored."
            ],
            disposal: [
                "FOR HER: THE CLAY MASK. Applied to her face and lips. She wears it as a silent, cherished statue.",
                "FOR HER: THE GILDED COLLAR. Poured over her neck and chest. A permanent mark of the night’s love.",
                "FOR HIM: THE BITTER SWALLOW. She takes it all while maintaining eye contact. Total consumption and surrender.",
                "FOR HIM: THE RECLAMATION. She gathers the offering from her skin and feeds it back to you. Shared intimacy.",
                "FOR BOTH: THE PRESS. Bodies crushed together until you are both coated and bound by the mess.",
                "FOR BOTH: THE SILK WIPE. She uses her hair or her clothes to clean you, marking them with the offering."
            ],
            sanctuary: [
                "THE HEALER’S HANDS: Release all bindings. Cradle in warm palms with soft, loving strokes.",
                "THE ANOINTING: Massage with warm oil. 'You did so well for me.'",
                "THE BREATH OF LIFE: Head on chest; breathe in unison for 60 seconds of peace.",
                "THE COVEN’S REST: No more commands. Just water and a soft touch on the cheek."
            ]
        };

        let activeMode = 'standard';
        const card = document.getElementById('card');
        const textDisplay = document.getElementById('prompt-text');
        const overlay = document.getElementById('confirm-overlay');

        function requestRitual(mode) { activeMode = mode; overlay.style.display = 'flex'; }
        function confirmRitual(isYes) { overlay.style.display = 'none'; if (isYes) drawNew(activeMode); }
        function drawNew(mode) {
            card.classList.remove('flipped', 'burn');
            setTimeout(() => {
                const pool = decks[mode];
                textDisplay.innerText = pool[Math.floor(Math.random() * pool.length)];
                if (mode !== 'standard') card.classList.add('flipped');
            }, 300);
        }
        function veto() { card.classList.add('burn'); setTimeout(() => drawNew('standard'), 600); }
    </script>
</body>
</html>
