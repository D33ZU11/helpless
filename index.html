<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>The Shadow Grimoire | Veil of Whispers</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=IM+Fell+English+SC&family=MedievalSharp&display=swap" rel="stylesheet">
    <style>
        /* All your styles remain exactly as you designed them */
        * { user-select: none; -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        :root { --gold: #e4c580; --blood: #8b2a2a; --void: #03000a; --parchment: #f2e9d0; }
        body { background: radial-gradient(ellipse at 30% 40%, #2c1420 0%, var(--void) 100%); color: var(--gold); font-family: 'IM Fell English SC', serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; padding: 10px; overflow-x: hidden; perspective: 1200px; }
        .card-holder { position: relative; width: 290px; height: 400px; z-index: 20; margin: 15px 0; filter: drop-shadow(0 15px 45px rgba(0,0,0,0.9)); }
        .card { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer; }
        .card.flipped { transform: rotateY(180deg); }
        .card-face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 25px; border: 2px solid var(--gold); display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 30px; text-align: center; box-shadow: inset 0 0 60px rgba(0,0,0,0.95); }
        .card-front { background: #0f0712; }
        .card-back { background: linear-gradient(145deg, #1a0b1c 0%, #050308 100%); transform: rotateY(180deg); color: var(--parchment); font-family: 'MedievalSharp', serif; font-size: 1.1rem; line-height: 1.4; border: 2px solid #634d2a; overflow-y: auto; }
        .ritual-altar { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; width: 100%; max-width: 350px; z-index: 25; margin-top: 10px; }
        button { background: rgba(15, 8, 20, 0.9); border: 1px solid var(--gold); color: var(--gold); padding: 12px 5px; font-family: 'Cinzel Decorative', cursive; font-size: 0.75rem; border-radius: 10px; cursor: pointer; }
        .btn-wide { grid-column: span 3; }
        .pact-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.97); z-index: 100; display: none; align-items: center; justify-content: center; }
        .pact-card { background: #120b17; border: 2px solid var(--gold); padding: 35px; border-radius: 20px; text-align: center; width: 85%; }
    </style>
</head>
<body>

    <div class="card-holder" id="cardContainer">
        <div class="card" id="ritualCard">
            <div class="card-face card-front"><h1>◈</h1><p>TOUCH THE VEIL</p></div>
            <div class="card-face card-back" id="oracleText"><div class="ritual-text">Speak the command...</div></div>
        </div>
    </div>

    <div class="ritual-altar">
        <button onclick="handleRitual('standard')">Standard</button>
        <button onclick="handleRitual('tithe')">Queen's Tithe</button>
        <button onclick="handleRitual('abyss')">The Abyss</button>
        <button onclick="handleRitual('finish')" class="btn-wide">Final Judgment</button>
        <button onclick="handleRitual('disposal')" class="btn-wide">The Disposal</button>
        <button onclick="handleRitual('sanctuary')" class="btn-wide">The Afterglow</button>
    </div>

    <div id="pactOverlay" class="pact-overlay">
        <div class="pact-card">
            <h2>Invoke the Rite?</h2>
            <div style="display: flex; gap: 15px; justify-content: center;">
                <button onclick="confirmPact(true)">Seal Pact</button>
                <button onclick="confirmPact(false)">Retreat</button>
            </div>
        </div>
    </div>

    <script type="module">
        // Import your descriptions from the separate file
        import { RitualDecks } from './rituals.js';
        
        let lastCategory = '';
        let pendingCategory = '';
        const card = document.getElementById('ritualCard');
        const oracle = document.getElementById('oracleText');

        // This makes the internal functions "Global" so the HTML buttons can see them
        window.handleRitual = function(category) {
            if (category !== 'standard' && category !== 'sanctuary' && category !== lastCategory) {
                pendingCategory = category;
                document.getElementById('pactOverlay').style.display = 'flex';
            } else {
                drawCard(category);
            }
        };

        window.confirmPact = function(yes) {
            document.getElementById('pactOverlay').style.display = 'none';
            if (yes) {
                lastCategory = pendingCategory;
                drawCard(pendingCategory);
            }
        };

        function drawCard(category) {
            const deck = RitualDecks[category];
            if (!deck) return; // Safety check
            const text = deck[Math.floor(Math.random() * deck.length)];
            
            if (card.classList.contains('flipped')) {
                card.classList.remove('flipped');
                setTimeout(() => { 
                    oracle.innerHTML = `<div class="ritual-text">${text}</div>`; 
                    card.classList.add('flipped'); 
                }, 400);
            } else { 
                oracle.innerHTML = `<div class="ritual-text">${text}</div>`; 
                card.classList.add('flipped'); 
            }
        }

        document.getElementById('cardContainer').onclick = () => card.classList.toggle('flipped');
    </script>
</body>
</html>
