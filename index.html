<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>The Shadow Grimoire | Ritual of the Toy</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=IM+Fell+English+SC&family=Nanum+Myeongjo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { user-select: none; -webkit-tap-highlight-color: transparent; }

        :root {
            --gold: #e4c580;
            --gold-glow: #ffdd99;
            --blood: #8b2a2a;
            --void: #03000a;
            --purple-haze: #1a0b1c;
            --parchment: #f2e9d0;
        }

        body {
            background: radial-gradient(circle at center, var(--purple-haze) 0%, var(--void) 100%);
            color: var(--gold);
            font-family: 'IM Fell English SC', serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
            perspective: 1000px;
        }

        /* Animated Ember/Dust Particles */
        .particles {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            background-image: radial-gradient(circle, var(--gold) 1px, transparent 1px);
            background-size: 50px 50px;
            opacity: 0.1;
            animation: moveParticles 20s linear infinite;
        }

        @keyframes moveParticles {
            from { background-position: 0 0; }
            to { background-position: 500px 1000px; }
        }

        /* Candle Flicker Overlay */
        .flicker {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.1);
            animation: candleFlicker 3s infinite;
            pointer-events: none;
            z-index: 5;
        }

        @keyframes candleFlicker {
            0%, 100% { opacity: 0.2; }
            50% { opacity: 0.05; }
            70% { opacity: 0.15; }
        }

        h1 {
            font-family: 'Cinzel Decorative', cursive;
            font-size: 1.8rem;
            letter-spacing: 6px;
            background: linear-gradient(to bottom, var(--gold), #856d3c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
            filter: drop-shadow(0 0 5px rgba(228, 197, 128, 0.3));
        }

        .sub {
            font-size: 0.7rem;
            letter-spacing: 4px;
            color: #7a6a4a;
            margin-bottom: 25px;
        }

        #card-table {
            position: relative;
            width: 320px;
            height: 480px;
            z-index: 10;
        }

        /* The Aura around the card when revealed */
        .card-aura {
            position: absolute;
            top: 50%; left: 50%;
            width: 120%; height: 120%;
            background: radial-gradient(circle, rgba(139, 42, 42, 0.4) 0%, transparent 70%);
            transform: translate(-50%, -50%);
            opacity: 0;
            transition: opacity 0.8s;
            pointer-events: none;
        }

        .card.flipped ~ .card-aura { opacity: 1; animation: pulseAura 2s infinite; }

        @keyframes pulseAura {
            0%, 100% { transform: translate(-50%, -50%) scale(1); }
            50% { transform: translate(-50%, -50%) scale(1.1); }
        }

        .card {
            width: 100%; height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
            border-radius: 20px;
        }

        .card.flipped { transform: rotateY(180deg) rotateZ(-2deg); }
        
        .card.burn { 
            animation: burnAway 0.6s forwards;
        }

        @keyframes burnAway {
            0% { transform: scale(1); filter: brightness(1) sepia(0); }
            50% { transform: scale(1.1) rotate(5deg); filter: brightness(2) sepia(1) hue-rotate(-50deg); }
            100% { transform: scale(0); opacity: 0; filter: brightness(5); }
        }

        .card-face {
            position: absolute;
            width: 100%; height: 100%;
            backface-visibility: hidden;
            border-radius: 20px;
            border: 2px solid var(--gold);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 30px;
            box-sizing: border-box;
            box-shadow: 0 15px 50px rgba(0,0,0,0.8);
        }

        .card-front {
            background: #0c0810;
            background-image: url('https://www.transparenttextures.com/patterns/dark-matter.png');
        }

        .card-back {
            background: linear-gradient(135deg, #120a16 0%, #050505 100%);
            transform: rotateY(180deg);
            color: var(--parchment);
            font-size: 1.4rem;
            text-align: center;
            border-color: var(--blood);
            box-shadow: inset 0 0 40px rgba(139, 42, 42, 0.2);
        }

        .seal {
            font-size: 5rem;
            margin-bottom: 20px;
            color: var(--gold);
            text-shadow: 0 0 20px var(--gold);
        }

        .controls {
            margin-top: 40px;
            display: flex;
            gap: 20px;
            z-index: 20;
        }

        button {
            background: rgba(20, 10, 25, 0.8);
            border: 1px solid var(--gold);
            color: var(--gold);
            padding: 12px 25px;
            font-family: 'Cinzel Decorative', cursive;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        button:hover {
            background: var(--gold);
            color: var(--void);
            box-shadow: 0 0 15px var(--gold);
        }

        .veto-btn { border-color: var(--blood); color: var(--blood); }
        .veto-btn:hover { background: var(--blood); color: white; }

        #ritual-msg {
            margin-top: 20px;
            font-size: 0.8rem;
            color: #666;
            font-style: italic;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <div class="particles"></div>
    <div class="flicker"></div>

    <h1>🜏 THE GRIMOIRE 🜏</h1>
    <div class="sub">DECREES OF THE BOUND</div>

    <div id="card-table">
        <div class="card" id="card" onclick="this.classList.toggle('flipped')">
            <div class="card-face card-front">
                <div class="seal">⛧</div>
                <p>REVEAL YOUR FATE</p>
            </div>
            <div class="card-face card-back" id="prompt-text">
                Prepare your skin...
            </div>
        </div>
        <div class="card-aura"></div>
    </div>

    <div class="controls">
        <button onclick="drawNew()">Draw Command</button>
        <button class="veto-btn" onclick="veto()">Veto</button>
    </div>
    <div id="ritual-msg">Awaiting her will...</div>

    <script>
        /* =========================================================
           CARDS DATA: Add or edit your commands here.
           ========================================================= */
        const commands = [
            "THE GRAVITY WELL: Secure weights to the sac. I must stand perfectly still while they stretch. Any movement earns a squeeze.",
            "THE CROW'S PINCH: Use your sharpest nails to find the skin between, pulling and pinching while I'm restricted.",
            "THE WICKED TWIST: Slowly rotate the sac a full half-turn. Hold it there while you tell me exactly what I am.",
            "THE CRUSHING DEPTHS: Place the sac between your palms and slowly lean your weight into them for a slow, agonizing squeeze.",
            "THE BOUND STRETCH: With my hands tied high, pull my stones toward the floor until I'm on my tiptoes and gasping.",
            "THE BLOOD COIL: Use a thin lace or string to tie around the base, cinching it tight while you toy with the tops.",
            "THE COLD DECREE: Apply ice until they are shrunken and tight, then use your warm mouth to bring the heat back.",
            "THE MISTRESS'S CHOICE: You decide the tool, you decide the tension. No limit for 60 seconds.",
            "THE VELVET VETO: Squeeze firmly, but stroke the skin softly. A mix of pain and pleasure until I lose count.",
            "THE PENDULUM: Pull them back and release them, letting them swing into your waiting palm with a sharp 'thud'."
        ];

        const card = document.getElementById('card');
        const textDisplay = document.getElementById('prompt-text');
        const ritualMsg = document.getElementById('ritual-msg');

        function drawNew() {
            card.classList.remove('flipped', 'burn');
            ritualMsg.innerText = "The shadows shift...";
            
            setTimeout(() => {
                const random = commands[Math.floor(Math.random() * commands.length)];
                textDisplay.innerText = random;
                ritualMsg.innerText = "A new decree is written.";
            }, 300);
        }

        function veto() {
            card.classList.add('burn');
            ritualMsg.innerText = "The command is burned to ash...";
            
            setTimeout(() => {
                drawNew();
            }, 600);
        }
    </script>
</body>
</html>
