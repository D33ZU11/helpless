<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>The Shadow Grimoire | Veil of Whispers</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=IM+Fell+English+SC&family=MedievalSharp&display=swap" rel="stylesheet">
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
        }

        :root {
            --gold: #e4c580;
            --blood: #8b2a2a;
            --void: #03000a;
            --parchment: #f2e9d0;
            --ember: #ff7e4a;
        }

        body {
            background: radial-gradient(ellipse at 30% 40%, #2c1420 0%, var(--void) 100%);
            color: var(--gold);
            font-family: 'IM Fell English SC', serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 10px;
            overflow-x: hidden;
            perspective: 1200px;
        }

        .veil, .candle-glow {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .veil {
            background-image: radial-gradient(2px 2px at 20% 30%, var(--gold) 1px, transparent 1px),
                              radial-gradient(1px 1px at 70% 85%, #b96f30 1px, transparent 1px);
            background-size: 70px 70px, 40px 40px;
            opacity: 0.2;
            animation: driftRunes 35s linear infinite;
        }

        @keyframes driftRunes {
            0% { background-position: 0 0; }
            100% { background-position: 300px 500px; }
        }

        .grimoire-header {
            text-align: center;
            z-index: 15;
            margin: 10px 0;
        }

        h1 {
            font-family: 'Cinzel Decorative', cursive;
            font-size: 1.4rem;
            letter-spacing: 3px;
            background: linear-gradient(135deg, #efd592 10%, #b48b3a 70%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0;
        }

        /* The Card - Sexy & Readable */
        .card-holder {
            position: relative;
            width: 290px;
            height: 400px;
            z-index: 20;
            margin: 15px 0;
            filter: drop-shadow(0 15px 35px rgba(0,0,0,0.8));
        }

        .card {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .card.flipped { transform: rotateY(180deg); }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 25px;
            border: 2px solid var(--gold);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 25px;
            text-align: center;
            box-shadow: inset 0 0 50px rgba(0,0,0,0.9);
        }

        .card-front {
            background: #0f0712 url('https://www.transparenttextures.com/patterns/hexellence.png');
        }

        .card-back {
            background: linear-gradient(145deg, #1a0b1c 0%, #050308 100%);
            transform: rotateY(180deg);
            color: var(--parchment);
            font-family: 'MedievalSharp', serif;
            font-size: 1.1rem;
            line-height: 1.5;
            justify-content: flex-start;
            padding-top: 40px;
        }

        .ritual-text {
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }

        /* Buttons - Balanced & Large */
        .ritual-altar {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            width: 100%;
            max-width: 350px;
            z-index: 25;
            margin-top: 10px;
        }

        button {
            background: rgba(10, 5, 16, 0.8);
            border: 1px solid var(--gold);
            color: var(--gold);
            padding: 12px 5px;
            font-family: 'Cinzel Decorative', cursive;
            font-size: 0.7rem;
            border-radius: 10px;
            transition: 0.2s;
        }

        button:active { background: var(--gold); color: var(--void); }

        .btn-wide {
            grid-column: span 3;
            font-size: 0.8rem;
            letter-spacing: 2px;
            background: rgba(30, 15, 25, 0.9);
        }

        .btn-abyss { border-color: var(--blood); color: #ff8888; }

        .banish-rune {
            margin-top: 15px;
            width: 160px;
            background: transparent;
            border: 1px dashed var(--gold);
            font-size: 0.6rem;
            opacity: 0.7;
            z-index: 30;
        }

        /* Modal */
        .pact-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 100;
            display: none;
            align-items: center;
            justify-content: center;
        }

        .pact-card {
            background: #120b17;
            border: 2px solid var(--gold);
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            width: 280px;
        }
    </style>
</head>
<body>
    <div class="veil"></div>
    <div class="candle-glow"></div>

    <div class="grimoire-header">
        <h1>🜏 THE SHADOW GRIMOIRE 🜏</h1>
        <div class="sub">✧ Rites of the Unspoken ✧</div>
    </div>

    <div class="card-holder" id="cardContainer">
        <div class="card" id="ritualCard">
            <div class="card-face card-front">
                <div style="font-size: 4rem; margin-bottom: 10px;">◈</div>
                <p>TOUCH THE VEIL</p>
            </div>
            <div class="card-face card-back" id="oracleText">
                <div class="ritual-text">Speak the command...</div>
            </div>
        </div>
    </div>

    <div class="ritual-altar">
        <button onclick="handleRitual('standard')">Standard</button>
        <button onclick="handleRitual('tithe')">Queen's Tithe</button>
        <button onclick="handleRitual('abyss')" class="btn-abyss">The Abyss</button>
        <button onclick="handleRitual('finish')" class="btn-wide" style="grid-column: span 3; margin-bottom: 5px;">⚔️ Final Judgment</button>
        <button onclick="handleRitual('disposal')" class="btn-wide">🍷 The Disposal · Cherished</button>
        <button onclick="handleRitual('sanctuary')" class="btn-wide">🕯️ The Afterglow</button>
    </div>

    <button onclick="veto()" class="banish-rune">◉ BURN & BANISH ◉</button>

    <div id="pactOverlay" class="pact-overlay">
        <div class="pact-card">
            <h2 style="font-family: 'Cinzel Decorative';">Invoke the Rite?</h2>
            <div style="display: flex; gap: 15px; justify-content: center; margin-top: 20px;">
                <button onclick="confirmPact(true)" style="padding: 10px 15px;">Seal Pact</button>
                <button onclick="confirmPact(false)" style="padding: 10px 15px; border-color: #555;">Retreat</button>
            </div>
        </div>
    </div>

    <script>
        const RitualDecks = {
            standard: ["THE GRAVITY WELL · Secure weights to the sac. Stand motionless for 3 minutes. Any tremor earns a slow, crushing squeeze.", "THE CROW'S PINCH · With sharp nails, find the skin between. Pull and pinch while you whisper my true title.", "THE WICKED TWIST · Rotate the flesh a full half-turn. Hold while you recite: 'I am yours.'"],
            abyss: ["THE IRON GALLOWS · Weights attached. Stand on tiptoes. Each time heels touch floor, deliver a brutal squeeze.", "THE SILENT ANCHOR · Heavy clamp applied. Ignored for 10 minutes kneeling."],
            tithe: ["FOOTREST · Legs spread, sac weighted. Support her feet while she rests.", "THE ROYAL CLEANSE · Use your tongue to clean her soles."],
            finish: ["THE RUINED OFFERING · Edge to absolute brink— then a crushing squeeze and an ice shard. No release.", "THE BROKEN PRAYER · Release granted only while being painfully twisted."],
            disposal: ["THE CLAY MASK · Applied to her face and lips. Worn as a sacred, silent statue.", "THE GILDED COLLAR · Poured over her neck and chest. A permanent mark."],
            sanctuary: ["THE HEALER’S HANDS · Release all bindings. Cradle in warm palms with slow strokes.", "THE ANOINTING · Massage with blessed oil. 'You served well.'"]
        };

        let lastCategory = '';
        let pendingCategory = '';
        const card = document.getElementById('ritualCard');

        function handleRitual(category) {
            // Only show popup if it's a NEW category (and not standard)
            if (category !== 'standard' && category !== lastCategory) {
                pendingCategory = category;
                document.getElementById('pactOverlay').style.display = 'flex';
            } else {
                drawCard(category);
            }
            lastCategory = category;
        }

        function confirmPact(yes) {
            document.getElementById('pactOverlay').style.display = 'none';
            if (yes) drawCard(pendingCategory);
        }

        function drawCard(category) {
            const deck = RitualDecks[category];
            const text = deck[Math.floor(Math.random() * deck.length)];
            
            // If already flipped, hide then show new text
            if (card.classList.contains('flipped')) {
                card.classList.remove('flipped');
                setTimeout(() => {
                    document.getElementById('oracleText').innerHTML = `<div class="ritual-text">${text}</div>`;
                    card.classList.add('flipped');
                }, 400);
            } else {
                document.getElementById('oracleText').innerHTML = `<div class="ritual-text">${text}</div>`;
                card.classList.add('flipped');
            }
        }

        function veto() {
            card.style.transition = '0.3s';
            card.style.transform = 'scale(0) rotate(20deg)';
            setTimeout(() => {
                card.classList.remove('flipped');
                card.style.transform = 'scale(1) rotate(0deg)';
                drawCard('standard');
            }, 400);
        }

        document.getElementById('cardContainer').onclick = () => card.classList.toggle('flipped');
    </script>
</body>
</html>
