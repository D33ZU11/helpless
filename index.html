<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>The Shadow Grimoire | Complete Ritual</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=IM+Fell+English+SC&display=swap" rel="stylesheet">
    <style>
        * { user-select: none; -webkit-tap-highlight-color: transparent; }
        :root {
            --gold: #e4c580; --blood: #8b2a2a; --void: #03000a;
            --purple-haze: #1a0b1c; --parchment: #f2e9d0;
        }

        body {
            background: radial-gradient(circle at center, var(--purple-haze) 0%, var(--void) 100%);
            color: var(--gold); font-family: 'IM Fell English SC', serif;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            min-height: 100vh; margin: 0; overflow: hidden; perspective: 1000px;
        }

        .particles { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; background-image: radial-gradient(circle, var(--gold) 1px, transparent 1px); background-size: 50px 50px; opacity: 0.1; animation: moveParticles 20s linear infinite; }
        @keyframes moveParticles { from { background-position: 0 0; } to { background-position: 500px 1000px; } }
        .flicker { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.1); animation: candleFlicker 3s infinite; pointer-events: none; z-index: 5; }

        h1 { font-family: 'Cinzel Decorative', cursive; font-size: 1.4rem; letter-spacing: 4px; text-align: center; margin: 5px 0; background: linear-gradient(to bottom, var(--gold), #856d3c); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        #card-table { position: relative; width: 280px; height: 380px; z-index: 10; margin: 10px 0; }
        .card { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; transition: transform 0.8s cubic-bezier(0.34, 1.56, 0.64, 1); border-radius: 20px; }
        .card.flipped { transform: rotateY(180deg) rotateZ(-2deg); }
        .card.burn { animation: burnAway 0.6s forwards; }
        @keyframes burnAway { 0% { transform: scale(1); } 50% { transform: scale(1.1); filter: brightness(3) sepia(1); } 100% { transform: scale(0); opacity: 0; } }

        .card-face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 20px; border: 2px solid var(--gold); display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; box-sizing: border-box; box-shadow: 0 15px 50px rgba(0,0,0,0.8); text-align: center; }
        .card-front { background: #0c0810; background-image: url('https://www.transparenttextures.com/patterns/dark-matter.png'); }
        .card-back { background: linear-gradient(135deg, #120a16 0%, #050505 100%); transform: rotateY(180deg); color: var(--parchment); font-size: 1.1rem; overflow-y: auto; }

        .controls-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; width: 320px; z-index: 20; padding: 10px; }
        button { background: rgba(20, 10, 25, 0.8); border: 1px solid var(--gold); color: var(--gold); padding: 8px; font-family: 'Cinzel Decorative', cursive; border-radius: 5px; cursor: pointer; font-size: 0.6rem; letter-spacing: 1px; text-transform: uppercase; }
        button:hover { background: var(--gold); color: var(--void); }
        
        .btn-abyss { border-color: #ff4444; color: #ff4444; }
        .btn-special { border-color: #9370db; color: #9370db; }
        .btn-end { border-color: #fff; background: rgba(60,0,0,0.4); }
        .btn-veto { grid-column: span 2; border-color: var(--blood); }

        #confirm-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 100; display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        #confirm-overlay img { width: 120px; border-radius: 50%; border: 2px solid var(--gold); margin-bottom: 15px; }
    </style>
</head>
<body>
    <div class="particles"></div><div class="flicker"></div>

    <div id="confirm-overlay">
        <img src="https://api.dicebear.com/7.x/adventurer/svg?seed=evil-laugh&backgroundColor=03000a" alt="Grin">
        <h2 style="font-family: 'Cinzel Decorative'; color: var(--gold);">Proceed, Mistress?</h2>
        <p style="color: #888; padding: 0 20px;">The toy is ready for his undoing.</p>
        <button onclick="confirmRitual(true)" style="padding: 10px 20px; font-size: 1rem; margin-bottom: 10px;">Seal the Pact</button>
        <button onclick="confirmRitual(false)" style="border-color: #444; color: #444;">Not yet</button>
    </div>

    <h1>🜏 THE SHADOW GRIMOIRE 🜏</h1>

    <div id="card-table">
        <div class="card" id="card" onclick="this.classList.toggle('flipped')">
            <div class="card-face card-front"><div style="font-size: 3rem;">𖤐</div><p>TAP TO REVEAL</p></div>
            <div class="card-face card-back" id="prompt-text">Select your ritual...</div>
        </div>
    </div>

    <div class="controls-grid">
        <button onclick="drawNew('standard')">Standard</button>
        <button onclick="requestRitual('giggles')" class="btn-special">For Giggles</button>
        <button onclick="requestRitual('humiliation')" class="btn-abyss">Humiliation</button>
        <button onclick="requestRitual('tithe')" class="btn-special">Queen's Tithe</button>
        <button onclick="requestRitual('abyss')" class="btn-abyss">The Abyss</button>
        <button onclick="requestRitual('sanctuary')" class="btn-special">Sanctuary</button>
        <button onclick="requestRitual('finish')" class="btn-end">Finish Him</button>
        <button onclick="requestRitual('disposal')" class="btn-end">Disposal</button>
        <button class="btn-veto" onclick="veto()">Veto Command</button>
    </div>

    <script>
        const decks = {
            standard: ["THE GRAVITY WELL: Weights to the sac. Stand still. Any movement = squeeze.", "THE CROW'S PINCH: Sharp nails to find the skin between. Pull and pinch.", "THE WICKED TWIST: Rotate sac half-turn. Hold and confess your status.", "THE CRUSHING DEPTHS: Sac between palms. Lean in for slow agony.", "THE PENDULUM: Pull and release into palm with a sharp thud."],
            abyss: ["THE TOY’S PILGRIMAGE: Cord from sac to ankles. Walk and pull your own skin taut.", "THE DESCENT OF THE BLACK SUN: Heavy weight swing. If I flinch, deliver a brutal squeeze.", "THE WITCH’S VICE: Twist until white. Zip-tie and leave me while you ignore my groans.", "THE MARK OF CANAAN: Trace symbols with a cold blade. Gasping = 10s squeeze.", "THE HELPLESS RECKONING: Use feet to roll and squish them under your heel. I am your footstool."],
            giggles: ["THE JINGLING PRISON: Bell tied to sac. Every jingle = 'Thank you Mistress'.", "THE WADDLING PEASANT: Heavy weights. Fetch her a 'tribute' by waddling clumsily.", "THE CAPTIVE CHORUS: Groans forbidden. Must 'beep' or make silly sounds instead.", "THE DECORATED TOY: Use markers/stickers to 'decorate' the sac while stretched. Stay still."],
            humiliation: ["THE PETTY EXHIBITION: Spotlight on the sac. Mock the size and desperation of the 'package'.", "THE BEGGAR'S OATH: Edge me with one finger while I recite why you are better than me.", "THE SILK MUZZLE: Throb in the sac while tasting a worn stocking tied in my mouth.", "THE TOY’S INVENTORY: Measure the stretch with a ruler and mock the results aloud."],
            tithe: ["THE ALTAR OF THE FOOT: Legs untied, hands bound. Massage her feet using only my face/neck.", "THE BOUND CONDUIT: I am your tool for pleasure. Total silence or punishment squeeze.", "THE TETHERED VALET: Untie for a task, but leash the sac to her wrist. Don't be slow.", "THE QUEEN'S SPOIL: Untied for service but must remain 'marked' with a heavy clamp."],
            finish: ["THE SHATTERED PRAYER: Edge to the limit, then a crushing squeeze and walk away. Leave me ruined.", "THE FORCED OVERFLOW: Release granted, but only during a heavy, painful stretch.", "THE TOY’S BANKRUPTCY: Edge until sobbing, then use ice to kill it. No release today.", "THE ACCIDENTAL DEBT: Release without permission? Session resets with double weight."],
            disposal: ["THE SEAL OF SILENCE: Smeared across my lips. Taste the surrender until she allows cleanup.", "THE LAPPING HOUND: Crawl and clean every trace from her skin/floor using only my tongue.", "THE TROPHY COLLAR: Wipe onto a scarf and tie it around my neck. Wear it all night.", "THE WITCH’S DRAIN: Watch her discard the offering down the drain like waste."],
            sanctuary: ["THE HEALER’S HANDS: Release bindings. Cradle in warm palms with soft strokes.", "THE ANOINTING: Massage with warm oil. 'You did so well for me.'", "THE BREATH OF LIFE: Head on chest; breathe in unison for 60s.", "THE COVEN’S REST: No more commands. Just water and a soft touch on the cheek."]
        };

        let activeMode = 'standard';
        const card = document.getElementById('card');
        const textDisplay = document.getElementById('prompt-text');
        const overlay = document.getElementById('confirm-overlay');

        function requestRitual(mode) { activeMode = mode; overlay.style.display = 'flex'; }
        function confirmRitual(isYes) { overlay.style.display = 'none'; if (isYes) drawNew(activeMode); }
        function drawNew(mode) {
            card.classList.remove('flipped', 'burn');
            setTimeout(() => {
                const pool = decks[mode];
                textDisplay.innerText = pool[Math.floor(Math.random() * pool.length)];
                if (mode !== 'standard') card.classList.add('flipped');
            }, 300);
        }
        function veto() { card.classList.add('burn'); setTimeout(() => drawNew('standard'), 600); }
    </script>
</body>
</html>
